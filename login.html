<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- ** NEW: Include config.js first ** -->
    <script src="./javascripts/config.js"></script>
</head>

<body class="login-page">
    <div class="login-container">
        <h1>เข้าสู่ระบบ</h1>
        <div id="loginMessage" class="message-area"></div>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" required>
                <span id="usernameError" class="error-message"></span>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="รหัสผ่าน" required>
                <span id="passwordError" class="error-message"></span>
            </div>
            <div class="form-options">
                <label><input type="checkbox" id="rememberMeCheckbox" name="remember"> จดจำฉัน</label>
                <a href="#">ลืมรหัสผ่าน</a>
            </div>
            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
            <div class="signup-link">
                ยังไม่มีบัญชี? <a href="#" id="openRegisterModal">สมัครสมาชิก</a>
            </div>
            <a href="index.html" class="back-link">ย้อนกลับหน้าหลัก</a>
        </form>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>สมัครสมาชิก</h2>
            <div id="registerMessage" class="message-area"></div>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="regFullName" placeholder="ชื่อ-นามสกุล" required>
                    <span id="regFullNameError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="ชื่อผู้ใช้งาน (สำหรับ Login)" required>
                    <span id="regUsernameError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="รหัสผ่าน" required>
                    <span id="regPasswordError" class="error-message"></span>
                    <!-- NEW: Password Requirements Display -->
                    <div id="passwordRequirements" class="mt-2 text-sm text-gray-600">
                        <ul class="list-none p-0 m-0">
                            <li id="reqLength" class="flex items-center"><i
                                    class="fas fa-times-circle text-red-500 mr-2"></i> ความยาวอย่างน้อย 8 ตัวอักษร</li>
                            <li id="reqUppercase" class="flex items-center"><i
                                    class="fas fa-times-circle text-red-500 mr-2"></i> มีตัวอักษรพิมพ์ใหญ่อย่างน้อย 1
                                ตัว</li>
                            <li id="reqLowercase" class="flex items-center"><i
                                    class="fas fa-times-circle text-red-500 mr-2"></i> มีตัวอักษรพิมพ์เล็กอย่างน้อย 1
                                ตัว</li>
                            <li id="reqNumber" class="flex items-center"><i
                                    class="fas fa-times-circle text-red-500 mr-2"></i> มีตัวเลขอย่างน้อย 1 ตัว</li>
                            <li id="reqSpecial" class="flex items-center"><i
                                    class="fas fa-times-circle text-red-500 mr-2"></i> มีอักขระพิเศษอย่างน้อย 1 ตัว</li>
                        </ul>
                    </div>
                </div>
                <div class="form-group"><input type="text" id="regPosition" placeholder="ตำแหน่ง"></div>
                <div class="form-group">
                    <select id="regDepartId" required>
                        <option value="" disabled selected>-- กำลังโหลดแผนก... --</option>
                    </select>
                </div>
                <button type="submit" class="login-btn">ยืนยันการสมัคร</button>
            </form>
        </div>
    </div>

    <!-- Status Modal -->
    <div id="statusModal" class="status-modal">
        <div class="status-modal-content">
            <span class="close-status-button">&times;</span>
            <div id="statusIcon"></div>
            <h3 id="statusTitle"></h3>
            <p id="statusMessage"></p>
        </div>
    </div>

    <script src="./javascripts/autologin.js"></script>
    <script src="./javascripts/login.js"></script>
</body>

</html>
