<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบบันทึกตัวชี้วัด</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <!-- ** NEW: Include config.js first ** -->
    <script src="./javascripts/config.js"></script>
</head>

<body class="dashboard-page">

    <header class="home-header">
        <div class="header-title">
            <a href="home.html" class="header-link">
                <h1>ตัวชี้วัด PART 4</h1>
            </a>
        </div>
        <nav class="top-nav">
            <div id="userInfo" class="user-info-display">
                <i class="fas fa-spinner fa-spin"></i> กำลังโหลด...
            </div>
            <button id="logoutButton" class="btn btn-danger-outline">
                <i class="fas fa-sign-out-alt"></i>
                <span>ออกจากระบบ</span>
            </button>
        </nav>
    </header>

    <main class="dashboard-main-content p-4 md:p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-chart-line mr-2"></i> สรุปผล Dashboard</h2>

        <div class="filter-bar mb-6 flex items-center space-x-4">
            <div class="date-filter-item">
                <label for="endYearSelect" class="block text-sm font-medium text-gray-700">เลือกปีสิ้นสุด</label>
                <select id="endYearSelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md bg-white">
                    <!-- ตัวเลือกปีจะถูกสร้างด้วย JavaScript -->
                </select>
            </div>
            <button id="filterButton"
                class="mt-auto px-4 py-2 bg-blue-600 text-white font-semibold rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                <i class="fas fa-filter mr-2"></i> กรอง
            </button>
        </div>

        <div id="kpiCardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            <p class="text-center text-gray-500 col-span-full">กำลังโหลดข้อมูล KPI...</p>
        </div>
    </main>

    <!-- Flowbite JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Dashboard JS -->
    <script src="./javascripts/dashboard.js"></script>
</body>

</html>
